<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Syne', sans-serif; }
        .hero { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1547471080-7cc2caa01a7e?q=80&w=2000'); 
            background-size: cover; background-position: center;
        }
        h1 { font-size: 8rem; margin: 0; letter-spacing: -2px; text-transform: uppercase; }
        .premium-card { 
            margin-top: 50px; padding: 40px; border: 1px solid rgba(255,255,255,0.2); 
            backdrop-filter: blur(15px); border-radius: 20px; background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>
    <div class='hero'>
        <h1>TANZANIA ELITE</h1>
        <div class='premium-card'>
            <h2>Immersive Property Portfolio</h2>
            <p>Scroll to explore high-end architectural renders.</p>
        </div>
    </div>
</body>
</html>
