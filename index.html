<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Bongo Life | Premium Holidays</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f4f4f4; }
        header { background: #fff; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hero { height: 50vh; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://cdn.pixabay.com/photo/2016/11/14/04/45/elephant-1822636_1280.jpg'); background-size: cover; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 40px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        footer { text-align: center; padding: 20px; font-size: 0.8em; }
    </style>
</head>
<body>
    <header><h1>Bongo Life</h1></header>
    <div class='hero'><div><h1>Experience Tanzania</h1></div></div>
    <div class='grid'>
        <div class='card'><img src='https://cdn.pixabay.com/photo/2017/01/20/15/12/oribi-1995171_1280.jpg'></div>
        <div class='card'><img src='https://cdn.pixabay.com/photo/2018/01/14/23/12/travel-3082939_1280.jpg'></div>
        <div class='card'><img src='https://cdn.pixabay.com/photo/2017/04/05/11/56/image-2204796_1280.jpg'></div>
    </div>
    <footer>&copy; 2026 Bongo Life</footer>
</body>
</html>
