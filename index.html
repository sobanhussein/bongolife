<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Helvetica Neue', sans-serif; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(600px, 1fr)); gap: 5px; }
        .img-container { height: 80vh; overflow: hidden; position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); }
        h1 { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 6rem; z-index: 10; text-transform: uppercase; letter-spacing: 10px; }
    </style>
</head>
<body>
    <h1>Tanzania</h1>
    <div class='gallery'>
        <div class='img-container'><img src='https://images.unsplash.com/photo-1523805009345-7448845a9e53?q=80&w=2000'></div>
        <div class='img-container'><img src='https://images.unsplash.com/photo-1516426122078-c23e76319801?q=80&w=2000'></div>
    </div>
</body>
</html>
