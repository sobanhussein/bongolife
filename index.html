<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        .cinematic-hero { 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.6)), url('https://cdn.pixabay.com/photo/2016/11/14/04/45/elephant-1822636_1920.jpg'); 
            background-size: cover; background-position: center;
            animation: kenburns 20s infinite alternate ease-in-out;
        }
        @keyframes kenburns { from { transform: scale(1); } to { transform: scale(1.1); } }
        .easter-egg { opacity: 0; position: absolute; top: 10px; right: 10px; cursor: help; }
        .easter-egg:hover { opacity: 1; transition: 0.5s; }
    </style>
</head>
<body>
    <div class='cinematic-hero'>
        <h1 style='font-size: 8rem;'>SERENGETI</h1>
        <div class='easter-egg'>Unlocked by: husse</div>
    </div>
</body>
</html>
